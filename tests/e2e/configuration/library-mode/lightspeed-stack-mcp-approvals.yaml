name: Lightspeed Core Service (LCS)
service:
  host: 0.0.0.0
  port: 8080
  auth_enabled: false
  workers: 1
  color_log: true
  access_log: true
llama_stack:
  # Library mode - embeds llama-stack as library
  use_as_library_client: true
  library_client_config_path: run.yaml
user_data_collection:
  feedback_enabled: true
  feedback_storage: "/tmp/data/feedback"
  transcripts_enabled: true
  transcripts_storage: "/tmp/data/transcripts"
conversation_cache:
  type: "sqlite"
  sqlite:
    db_path: "/tmp/data/conversation-cache.db"
authentication:
  module: "noop-with-token"
inference:
  default_provider: openai
  default_model: gpt-4o-mini
approvals:
  approval_timeout_seconds: 60
  approval_retention_days: 7
mcp_servers:
  - name: "mcp-approval-always"
    provider_id: "model-context-protocol"
    url: "http://mock-mcp:3000"
    require_approval: "always"
  - name: "mcp-approval-never"
    provider_id: "model-context-protocol"
    url: "http://mock-mcp:3000"
    require_approval: "never"
  - name: "mcp-approval-granular"
    provider_id: "model-context-protocol"
    url: "http://mock-mcp:3000"
    require_approval:
      always:
        - "<PLACEHOLDER>"
      never:
        - "<PLACEHOLDER>"