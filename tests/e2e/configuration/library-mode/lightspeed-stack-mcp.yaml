name: Lightspeed Core Service (LCS)
service:
  host: 0.0.0.0
  port: 8080
  auth_enabled: false
  workers: 1
  color_log: true
  access_log: true
llama_stack:
  # Library mode - embeds llama-stack as library
  use_as_library_client: true
  # Unified mode: run.yaml (materialized per provider by CI/the harness)
  # is consumed as the synthesis profile instead of the legacy two-file path.
  config:
    profile: run.yaml
user_data_collection:
  feedback_enabled: true
  feedback_storage: "/tmp/data/feedback"
  transcripts_enabled: true
  transcripts_storage: "/tmp/data/transcripts"
authentication:
  module: "noop"
mcp_servers:
  - name: "mcp-oauth"
    url: "http://mock-mcp:3000"
    authorization_headers:
      Authorization: "oauth"
  - name: "mcp-kubernetes"
    url: "http://mock-mcp:3000"
    authorization_headers:
      Authorization: "kubernetes"
  - name: "mcp-file"
    url: "http://mock-mcp:3000"
    authorization_headers:
      Authorization: "/tmp/mcp-token"
  - name: "mcp-client"
    url: "http://mock-mcp:3000"
    authorization_headers:
      Authorization: "client"