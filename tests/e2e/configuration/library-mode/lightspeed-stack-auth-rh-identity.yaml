name: Lightspeed Core Service (LCS) - RH Identity Auth
service:
  host: 0.0.0.0
  port: 8080
  auth_enabled: true
  workers: 1
  color_log: true
  access_log: true
llama_stack:
  use_as_library_client: true
  # Unified mode: run.yaml (materialized per provider by CI/the harness)
  # is consumed as the synthesis profile instead of the legacy two-file path.
  config:
    profile: run.yaml
user_data_collection:
  feedback_enabled: true
  feedback_storage: "/tmp/data/feedback"
  transcripts_enabled: true
  transcripts_storage: "/tmp/data/transcripts"
conversation_cache:
  type: "sqlite"
  sqlite:
    db_path: "/tmp/data/conversation-cache.db"
authentication:
  module: "rh-identity"
  rh_identity_config:
    required_entitlements: ["rhel"]
