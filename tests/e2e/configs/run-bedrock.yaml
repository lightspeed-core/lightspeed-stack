version: 2
image_name: starter

apis:
- responses
- batches
- files
- inference
- safety
- tool_runtime
- conversations
- vector_io

# external_providers_dir: /opt/app-root/src/.llama/providers.d

providers:
  inference:
  - config:
      api_key: ${env.AWS_BEARER_TOKEN_BEDROCK}
      region_name: us-east-2
    provider_id: aws-bedrock
    provider_type: remote::bedrock
  - provider_id: openai
    provider_type: remote::openai
    config:
      api_key: ${env.OPENAI_API_KEY}
      allowed_models: ["${env.E2E_OPENAI_MODEL:=gpt-4o-mini}"]
  - config: {}
    provider_id: sentence-transformers
    provider_type: inline::sentence-transformers
  files:
  - config:
      metadata_store:
        table_name: files_metadata
        backend: sql_default
      storage_dir: ~/.llama/storage/files
    provider_id: meta-reference-files
    provider_type: inline::localfs
  safety:
  - config:
      excluded_categories: []
    provider_id: llama-guard
    provider_type: inline::llama-guard
  tool_runtime:
  - config: {} # Enable the RAG tool
    provider_id: file-search
    provider_type: inline::file-search
  - config: {} # Enable MCP (Model Context Protocol) support
    provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
  vector_io: []
  responses:
  - config:
      persistence:
        agent_state:
          namespace: agents_state
          backend: kv_default
        responses:
          table_name: agents_responses
          backend: sql_default
    provider_id: builtin
    provider_type: inline::builtin
  batches:
  - config:
      kvstore:
        namespace: batches_store
        backend: kv_default
    provider_id: reference
    provider_type: inline::reference
server:
  port: 8321
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.KV_STORE_PATH:=~/.llama/storage/kv_store.db}
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQL_STORE_PATH:=~/.llama/storage/sql_store.db}
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      namespace: prompts
      backend: kv_default
registered_resources:
  models:
  - model_id: custom-bedrock-model
    model_type: llm
    provider_id: aws-bedrock
    provider_model_id: deepseek.v3-v1:0
  - model_id: all-mpnet-base-v2
    model_type: embedding
    provider_id: sentence-transformers
    provider_model_id: all-mpnet-base-v2
    metadata:
      embedding_dimension: 768
  shields:
  - shield_id: llama-guard
    provider_id: llama-guard
    provider_shield_id: openai/gpt-4o-mini
  vector_stores: []
vector_stores:
  default_provider_id: faiss
  default_embedding_model: # Define the default embedding model for RAG
    provider_id: sentence-transformers
    model_id: all-mpnet-base-v2
safety:
  default_shield_id: llama-guard
