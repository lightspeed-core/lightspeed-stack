version: '2'
distro_name: minimal-viable-llama-stack-configuration

apis:
  - responses
  - datasetio
  - eval
  - inference
  - post_training
  - scoring
  - tool_runtime
  - vector_io
container_image: null
external_providers_dir: null
logging: null
providers:
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        responses:
          table_name: agents_responses
          backend: sql_default
  inference:
  - provider_id: openai
    provider_type: remote::openai
    config:
      api_key: ${env.OPENAI_API_KEY}
      allowed_models: ["gpt-4-turbo"]
  - provider_id: sentence-transformers
    provider_type: inline::sentence-transformers
    config: {}
  post_training:
  - config:
      checkpoint_format: huggingface
      device: cpu
      distributed_backend: null
    provider_id: huggingface
    provider_type: inline::huggingface
  telemetry:
  - config:
      service_name: ''
      sinks: sqlite
      sqlite_db_path: .llama/distributions/ollama/trace_store.db
    provider_id: builtin
    provider_type: inline::builtin
  tool_runtime:
  - provider_id: file-search
    provider_type: inline::file-search
    config: {}
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
    config: {}
  vector_io:
  - config:
      persistence:
        namespace: vector_io::faiss
        backend: kv_rag
    provider_id: faiss
    provider_type: inline::faiss
server:
  auth: null
  host: null
  port: 8321
  quota: null
  tls_cafile: null
  tls_certfile: null
  tls_keyfile: null
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.KV_STORE_PATH:=~/.llama/storage/kv_store.db}
    kv_rag: # Define the storage backend type for RAG
      type: kv_sqlite
      db_path: ${env.KV_RAG_PATH:=~/.llama/storage/rag/kv_store.db}
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQL_STORE_PATH:=~/.llama/storage/sql_store.db}
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      table_name: prompts
      backend: sql_default
    connectors:
      table_name: connectors
      backend: sql_default
registered_resources:
  models: []
  vector_stores: []
telemetry:
  enabled: true
vector_stores:
  default_provider_id: faiss
  default_embedding_model:
    provider_id: sentence-transformers
    model_id: all-mpnet-base-v2
