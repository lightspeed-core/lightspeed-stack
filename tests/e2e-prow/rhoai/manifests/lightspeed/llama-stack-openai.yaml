# Llama Stack pod: runs from source on UBI (no pre-built image).
#
# Flow:
#   1. setup-from-source: clone repo (from ConfigMap llama-stack-source or defaults), install deps (uv sync), prepare /opt/app-root.
#   2. setup-rag-data: extract RAG DB into shared volume.
#   3. Main container: run entrypoint → enrich config → llama stack run.
#
# Requires: ConfigMap llama-stack-config (run.yaml), ConfigMap rag-data (kv_store.db.gz).
# Optional: ConfigMap llama-stack-source (repo_url, repo_revision); if missing, uses defaults.
#
apiVersion: v1
kind: Pod
metadata:
  name: llama-stack-service
  labels:
    # Must match oc expose selector immediately on pod recreate (do not rely only on post-apply oc label).
    pod: llama-stack-service
spec:
  imagePullSecrets:
    - name: quay-lightspeed-pull-secret
  securityContext:
    seccompProfile:
      type: RuntimeDefault
    fsGroup: 0
  initContainers:
    - name: setup-from-source
      image: registry.access.redhat.com/ubi9/python-312
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: HOME
          value: "/opt/app-root/src"
        - name: REPO_URL
          valueFrom:
            configMapKeyRef:
              name: llama-stack-source
              key: repo_url
              optional: true
        - name: REPO_REVISION
          valueFrom:
            configMapKeyRef:
              name: llama-stack-source
              key: repo_revision
              optional: true
      command:
        - /bin/bash
        - -c
        - |
          set -ex
          echo "[init] starting setup-from-source"
          echo "[init] emptyDir contents:" && ls -la /opt/app-root/ 2>&1 || true
          # WORKDIR is /opt/app-root/src (from image); move out before removing it
          cd /opt/app-root
          # emptyDir src/ is root-owned; recreate it so user 1001 can write
          rm -rf /opt/app-root/src && mkdir -p /opt/app-root/src
          REPO_URL="${REPO_URL:-https://github.com/lightspeed-core/lightspeed-stack.git}"
          REPO_REVISION="${REPO_REVISION:-main}"
          case "$REPO_URL" in git@github.com:*) REPO_URL="https://github.com/${REPO_URL#git@github.com:}"; esac
          # Install uv to /tmp (emptyDir $HOME/.local not writable)
          echo "[init] installing uv"
          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/tmp/uv-bin INSTALLER_NO_MODIFY_PATH=1 XDG_CONFIG_HOME=/tmp sh
          export PATH="/tmp/uv-bin:$PATH"
          export UV_CACHE_DIR=/tmp/uv-cache
          uv --version
          # Clone and install Python deps (rm -rf handles restarts where emptyDir persists)
          echo "[init] cloning $REPO_URL @ $REPO_REVISION"
          rm -rf /opt/app-root/repo
          git clone -q "${REPO_URL}" /opt/app-root/repo
          cd /opt/app-root/repo && git fetch origin "${REPO_REVISION}" 2>/dev/null || true && git checkout -q "${REPO_REVISION}"
          echo "[init] running uv sync"
          uv sync --locked --no-install-project --group llslibdev
          echo "[init] uv sync complete, moving repo to /opt/app-root"
          # Move repo to /opt/app-root and fix venv shebangs (paths changed from repo/.venv to .venv)
          (cd /opt/app-root/repo && tar cf - .) | (cd /opt/app-root && tar x --no-overwrite-dir -f -)
          rm -rf /opt/app-root/repo
          sed -i 's|/opt/app-root/repo/.venv|/opt/app-root/.venv|g' /opt/app-root/.venv/bin/* 2>/dev/null || true
          # Layout for main container (no chown needed -- already running as 1001)
          mkdir -p /opt/app-root/src/.llama/storage/rag /opt/app-root/src/.llama/storage/files
          cp /opt/app-root/src/llama_stack_configuration.py /opt/app-root/llama_stack_configuration.py
          echo "[init] setup-from-source complete"
          echo "[init] setup-from-source complete"
      volumeMounts:
        - name: app-root
          mountPath: /opt/app-root
    - name: setup-rag-data
      image: busybox:latest
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      command:
        - /bin/sh
        - -c
        - |
          set -e
          mkdir -p /data/src/.llama/storage/rag /data/src/.llama/storage/files
          gunzip -c /rag-data/kv_store.db.gz > /data/src/.llama/storage/rag/kv_store.db
          ls -la /data/src/.llama/storage/rag/kv_store.db
          echo "RAG data extracted successfully"
      volumeMounts:
        - name: app-root
          mountPath: /data
        - name: rag-data
          mountPath: /rag-data
  containers:
    - name: llama-stack-container
      image: registry.access.redhat.com/ubi9/python-312
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      workingDir: /opt/app-root
      env:
        - name: PATH
          value: "/opt/app-root/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        - name: HOME
          value: "/opt/app-root/src"
        - name: PYTHONPATH
          value: "/opt/app-root/src"
        - name: E2E_LLAMA_HOSTNAME
          value: "localhost"
        - name: KV_STORE_PATH
          value: "/opt/app-root/src/.llama/storage/rag/kv_store.db"
        - name: KV_RAG_PATH
          value: "/opt/app-root/src/.llama/storage/rag/kv_store.db"
        - name: SQL_STORE_PATH
          value: "/opt/app-root/src/.llama/storage/sql_store.db"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api-key-secret
              key: key
        - name: E2E_OPENAI_MODEL
          value: "gpt-4o-mini"
        - name: FAISS_VECTOR_STORE_ID
          valueFrom:
            secretKeyRef:
              name: faiss-vector-store-secret
              key: id
      command:
        - /bin/bash
        - -c
        - |
          exec /opt/app-root/scripts/llama-stack-entrypoint.sh
      ports:
        - containerPort: 8321
      # Without probes, kubelet marks the pod Ready as soon as the container starts — before HTTP listens.
      # That made wait_for_pod return too early after disruption; align Ready with /v1/health (see docker-compose).
      readinessProbe:
        httpGet:
          path: /v1/health
          port: 8321
        initialDelaySeconds: 20
        periodSeconds: 5
        failureThreshold: 36
      livenessProbe:
        httpGet:
          path: /v1/health
          port: 8321
        initialDelaySeconds: 120
        periodSeconds: 20
        failureThreshold: 3
      volumeMounts:
        - name: app-root
          mountPath: /opt/app-root
        - name: config
          mountPath: /opt/app-root/run.yaml
          subPath: run.yaml
        - name: lcs-config
          mountPath: /opt/app-root/lightspeed-stack.yaml
          subPath: lightspeed-stack.yaml
        - name: entrypoint
          mountPath: /opt/app-root/scripts/llama-stack-entrypoint.sh
          subPath: llama-stack-entrypoint.sh
  volumes:
    - name: app-root
      emptyDir: {}
    - name: config
      configMap:
        name: llama-stack-config
    - name: lcs-config
      configMap:
        name: lightspeed-stack-config
    - name: entrypoint
      configMap:
        name: llama-stack-entrypoint
        defaultMode: 0755
    - name: rag-data
      configMap:
        name: rag-data
