version: 2
distro_name: rhaiis-configuration

apis:
- responses
- batches
- files
- inference
- tool_runtime
- vector_io
      
# external_providers_dir: /opt/app-root/src/.llama/providers.d

providers:
  inference:
  - provider_id: vllm
    provider_type: remote::vllm
    config:
      url: http://${env.RHAIIS_URL}:8000/v1/
      api_token: ${env.RHAIIS_API_KEY}
      tls_verify: false
      max_tokens: 2048
  - provider_id: openai
    provider_type: remote::openai
    config:
      api_key: ${env.OPENAI_API_KEY}
  - config: {}
    provider_id: sentence-transformers
    provider_type: inline::sentence-transformers
  files:
  - config:
      metadata_store:
        table_name: files_metadata
        backend: sql_default
      storage_dir: ~/.llama/storage/files
    provider_id: meta-reference-files
    provider_type: inline::localfs
  tool_runtime:
  - config: {}
    provider_id: file-search
    provider_type: inline::file-search
  vector_io:
  - config:
      persistence:
        namespace: vector_io::faiss
        backend: kv_default
    provider_id: faiss
    provider_type: inline::faiss
  responses:
  - config:
      persistence:
        responses:
          table_name: agents_responses
          backend: sql_default
    provider_id: meta-reference
    provider_type: inline::builtin
  batches:
  - config:
      sqlstore:
        table_name: batches
        backend: sql_default
    provider_id: reference
    provider_type: inline::reference
server:
  port: 8321
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.KV_STORE_PATH:=~/.llama/storage/rag/kv_store.db}
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQL_STORE_PATH:=~/.llama/storage/sql_store.db}
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      table_name: prompts
      backend: sql_default
    connectors:
      table_name: connectors
      backend: sql_default
registered_resources:
  models:
  - model_id: ${env.RHAIIS_MODEL}
    provider_id: vllm
    model_type: llm
    provider_model_id: ${env.RHAIIS_MODEL}
vector_stores:
  default_provider_id: faiss
  default_embedding_model:
    provider_id: sentence-transformers
    model_id: nomic-ai/nomic-embed-text-v1.5
telemetry:
  enabled: true
